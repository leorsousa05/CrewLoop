# .spec.yaml — metadata for specs/changes/NNN-name/
# Required in EVERY spec, including lightweight ones.
# Canonical schema — copy this file and fill in the values.

name: NNN-short-name      # must match the spec folder name
status: active            # active | completed
created: YYYY-MM-DD       # ISO date when the spec was created
completed: null           # ISO date when status became completed (null while active)
author: ""                # agent or person who created the spec
affected_files: []        # files this change creates, modifies, or deletes

