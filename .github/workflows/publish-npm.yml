name: Publish CrewLoop to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  assert-main:
    name: Assert tag is on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag points to a commit on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Tag $GITHUB_REF_NAME points to a commit that is not on main. Aborting publish."
            exit 1
          fi

  validate:
    name: Validate version
    runs-on: ubuntu-latest
    needs: assert-main
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assert root package version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "$VERSION" ]; then
            echo "Root package.json version ($pkg_version) does not match tag ($VERSION)"
            exit 1
          fi

  publish:
    name: Publish @archznn/crewloop-skills
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build --workspaces

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Wait for package to be available
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for i in $(seq 1 12); do
            published=$(npm view @archznn/crewloop-skills@"$VERSION" version 2>/dev/null || true)
            if [ "$published" = "$VERSION" ]; then
              echo "@archznn/crewloop-skills@$VERSION is available on npm"
              exit 0
            fi
            echo "Waiting for @archznn/crewloop-skills@$VERSION... ($i/12)"
            sleep 5
          done
          echo "Timeout waiting for @archznn/crewloop-skills@$VERSION"
          exit 1
