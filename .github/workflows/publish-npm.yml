name: Publish CrewLoop to npm

on:
  workflow_run:
    workflows: [release-tag]
    types: [completed]

permissions:
  contents: read

jobs:
  check-tag:
    name: Check version tag on main
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify exact version tag exists on this commit
        id: check
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          tag=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "")
          if [ "$tag" = "v${version}" ]; then
            echo "Found matching tag $tag"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "No matching version tag on this commit (found: ${tag:-none}, expected: v${version}). Skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  assert-main:
    name: Assert tag is on main
    runs-on: ubuntu-latest
    needs: check-tag
    if: needs.check-tag.outputs.should_publish == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tag points to a commit on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Tag points to a commit that is not on main. Aborting publish."
            exit 1
          fi

  validate:
    name: Validate version
    runs-on: ubuntu-latest
    needs: [check-tag, assert-main]
    if: needs.check-tag.outputs.should_publish == 'true'
    outputs:
      version: ${{ needs.check-tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert root package version matches tag
        env:
          VERSION: ${{ needs.check-tag.outputs.version }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "$VERSION" ]; then
            echo "Root package.json version ($pkg_version) does not match expected version ($VERSION)"
            exit 1
          fi

  publish:
    name: Publish @archznn/crewloop-skills
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build all workspaces
        run: npm run build --workspaces

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Wait for package to be available
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          for i in $(seq 1 12); do
            published=$(npm view @archznn/crewloop-skills@"$VERSION" version 2>/dev/null || true)
            if [ "$published" = "$VERSION" ]; then
              echo "@archznn/crewloop-skills@$VERSION is available on npm"
              exit 0
            fi
            echo "Waiting for @archznn/crewloop-skills@$VERSION... ($i/12)"
            sleep 5
          done
          echo "Timeout waiting for @archznn/crewloop-skills@$VERSION"
          exit 1
