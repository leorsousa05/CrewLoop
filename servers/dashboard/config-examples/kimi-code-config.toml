# Kimi Code configuration snippet for CrewLoop dashboard integration.
# Place in your Kimi Code config file and ensure crewloop-shim is on PATH.

[[hooks]]
event = "PreToolUse"
command = "crewloop-shim kimi --default-skill orchestrator"

[[hooks]]
event = "PostToolUse"
command = "crewloop-shim kimi --default-skill orchestrator"
